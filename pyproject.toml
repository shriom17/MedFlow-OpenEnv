[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta:__legacy__"

[project]
name = "hospital-queue-env"
version = "1.0.0"
description = "OpenEnv environment for hospital queue triage and resource allocation."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["openenv-core>=0.2.1", "pydantic>=2.0"]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio", "openai>=1.0"]
server = ["fastapi>=0.104", "uvicorn[standard]>=0.24", "websockets>=12"]
